<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile · Sunsex</title>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      color: #f5f5f5;
      font-family: 'Ubuntu', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .edit-wrap {
      width: min(380px, 92vw);
      background: rgba(255,255,255,0.95);
      color: #111;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #statusBar {
      font-size: 11px;
      min-height: 14px;
      opacity: 0.7;
    }

    .profile-id { font-size: 11px; opacity: 0.6; }

    input[type="text"], textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
    }

    textarea { min-height: 80px; }

    .feature-row {
      display: flex;
      gap: 10px;
    }

    .feature-btn {
      width: 50px;
      height: 50px;
      border: 1px dashed #bbb;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      font-size: 20px;
      color: #aaa;
    }

    .feature-btn img { width: 100%; height: 100%; object-fit: cover; }

    .avatar-preview {
      width: 100%;
      max-height: 200px;
      border-radius: 12px;
      overflow: hidden;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-preview img { max-width: 100%; max-height: 200px; object-fit: contain; }

    .field-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .field-row label { white-space: nowrap; opacity: 0.7; }
    .field-row input[type="file"] { font-size: 11px; }

    button {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }

    .btn-save {
      background: #111;
      color: #fff;
      font-weight: 700;
    }

    .btn-save:hover { background: #333; }

    .btn-secondary {
      background: #eee;
      color: #333;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #notOwnerMsg {
      display: none;
      color: #c00;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="edit-wrap">
  <div id="statusBar">Loading...</div>
  <div class="profile-id" id="playerID">P-ID: —</div>

  <input type="text" id="playerName" placeholder="Player Name" />

  <div class="feature-row">
    <label class="feature-btn" for="uploadSpecial1" title="Feature image 1">
      <img id="previewSpecial1" src="" alt="+" style="display:none;" />
      <span id="special1Placeholder">+</span>
    </label>
    <label class="feature-btn" for="uploadSpecial2" title="Feature image 2">
      <img id="previewSpecial2" src="" alt="+" style="display:none;" />
      <span id="special2Placeholder">+</span>
    </label>
  </div>

  <div class="avatar-preview" id="avatarPreview"></div>

  <div class="field-row">
    <label>Main image:</label>
    <input type="file" id="uploadMain" accept="image/*" />
  </div>

  <textarea id="playerMission" placeholder="Mission(s)... (one per line)"></textarea>

  <div class="field-row">
    <label>Popup background:</label>
    <input type="file" id="popupBgImage" accept="image/*" />
  </div>

  <p id="notOwnerMsg">You don't own this player profile.</p>

  <div class="btn-row">
    <button class="btn-save" id="saveBtn">Save Changes</button>
    <button class="btn-secondary" id="backBtn">← Back to Map</button>
    <button class="btn-secondary" id="logoutBtn">Log Out</button>
  </div>
</div>

<!-- Hidden file inputs -->
<input type="file" id="uploadSpecial1" accept="image/*" style="display:none" />
<input type="file" id="uploadSpecial2" accept="image/*" style="display:none" />

<script type="module">
import { supabase } from '/shared/js/supabase.js';

const params   = new URLSearchParams(location.search);
const playerId = params.get('id');

const statusBar = document.getElementById('statusBar');
const saveBtn   = document.getElementById('saveBtn');
const notOwner  = document.getElementById('notOwnerMsg');

let currentUser   = null;
let currentPlayer = null;
let uploads = { main: '', special1: '', special2: '', popupBg: '' };

// ── Auth gate ────────────────────────────────────────────────

const { data: { user } } = await supabase.auth.getUser();
currentUser = user;

if (!currentUser) {
  statusBar.textContent = 'Not logged in — redirecting...';
  setTimeout(() => location.href = '/dashboard', 1500);
  throw new Error('unauthenticated');
}

if (!playerId) {
  statusBar.textContent = 'No player ID in URL.';
  throw new Error('no pid');
}

// ── Load player ───────────────────────────────────────────────

const { data: player, error } = await supabase
  .from('players')
  .select('*')
  .eq('pid', playerId)
  .maybeSingle();

if (!player || error) {
  statusBar.textContent = 'Player not found.';
  throw new Error('player not found');
}

currentPlayer = player;

// Ownership check
if (player.owner_id !== currentUser.id) {
  statusBar.textContent = '';
  notOwner.style.display = 'block';
  saveBtn.disabled = true;
}

// Populate form
document.getElementById('playerID').textContent = 'P-ID: ' + player.pid;
document.getElementById('playerName').value = player.name || '';
document.getElementById('playerMission').value = Array.isArray(player.mission)
  ? player.mission.join('\n')
  : player.mission || '';

// Avatar preview
const preview = document.getElementById('avatarPreview');
if (player.spritesheet) {
  preview.innerHTML = `<img src="${player.spritesheet}" />`;
} else if (player.main) {
  preview.innerHTML = `<img id="mainImg" src="${player.main}" />`;
  uploads.main = player.main;
} else if (player.avatar) {
  preview.innerHTML = `<img src="${player.avatar}" />`;
}

// Feature images
function setSpecial(n, url) {
  if (!url) return;
  const img = document.getElementById(`previewSpecial${n}`);
  const placeholder = document.getElementById(`special${n}Placeholder`);
  img.src = url;
  img.style.display = 'block';
  placeholder.style.display = 'none';
  uploads[`special${n}`] = url;
}
setSpecial(1, player.special);
setSpecial(2, player.special2);

// Popup BG preview on form background
if (player.popupBg?.startsWith('http')) {
  uploads.popupBg = player.popupBg;
  document.querySelector('.edit-wrap').style.background =
    `url(${player.popupBg}) no-repeat center center / cover`;
}

statusBar.textContent = `Loaded ${player.pid}`;

// ── Upload helper ─────────────────────────────────────────────

async function uploadFile(file, filename) {
  const path = `userassets/${currentUser.id}/${filename}`;
  const { error } = await supabase.storage.from('userassets').upload(path, file, { upsert: true });
  if (error) throw error;
  const { data: pub } = supabase.storage.from('userassets').getPublicUrl(path);
  return pub.publicUrl;
}

// ── File input handlers ───────────────────────────────────────

document.getElementById('uploadMain').addEventListener('change', async function () {
  if (!this.files[0]) return;
  statusBar.textContent = 'Uploading...';
  try {
    const url = await uploadFile(this.files[0], 'main.webp');
    uploads.main = url;
    document.getElementById('avatarPreview').innerHTML = `<img id="mainImg" src="${url}" />`;
    statusBar.textContent = 'Main image uploaded.';
  } catch (e) {
    statusBar.textContent = 'Upload failed: ' + e.message;
  }
});

document.getElementById('uploadSpecial1').addEventListener('change', async function () {
  if (!this.files[0]) return;
  try {
    const url = await uploadFile(this.files[0], 'special1.webp');
    setSpecial(1, url);
  } catch (e) { statusBar.textContent = 'Upload failed: ' + e.message; }
});

document.getElementById('uploadSpecial2').addEventListener('change', async function () {
  if (!this.files[0]) return;
  try {
    const url = await uploadFile(this.files[0], 'special2.webp');
    setSpecial(2, url);
  } catch (e) { statusBar.textContent = 'Upload failed: ' + e.message; }
});

document.getElementById('popupBgImage').addEventListener('change', async function () {
  if (!this.files[0]) return;
  statusBar.textContent = 'Uploading background...';
  try {
    const url = await uploadFile(this.files[0], 'popupBg.webp');
    uploads.popupBg = url;
    document.querySelector('.edit-wrap').style.background =
      `url(${url}) no-repeat center center / cover`;
    statusBar.textContent = 'Background uploaded.';
  } catch (e) {
    statusBar.textContent = 'Upload failed: ' + e.message;
  }
});

// ── Save ──────────────────────────────────────────────────────

saveBtn.addEventListener('click', async () => {
  const name    = document.getElementById('playerName').value.trim();
  const mission = document.getElementById('playerMission').value.trim();

  statusBar.textContent = 'Saving...';

  const updates = {
    name,
    mission,
    ...(uploads.main     && { main:    uploads.main }),
    ...(uploads.special1 && { special: uploads.special1 }),
    ...(uploads.special2 && { special2: uploads.special2 }),
    ...(uploads.popupBg  && { popupBg: uploads.popupBg }),
  };

  const { error } = await supabase
    .from('players')
    .update(updates)
    .eq('pid', playerId)
    .eq('owner_id', currentUser.id);

  if (error) {
    statusBar.textContent = 'Save failed: ' + error.message;
  } else {
    statusBar.textContent = 'Saved!';
    setTimeout(() => location.href = '/map', 1200);
  }
});

// ── Nav buttons ───────────────────────────────────────────────

document.getElementById('backBtn').addEventListener('click', () => location.href = '/map');

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  location.href = '/dashboard';
});
</script>

</body>
</html>
