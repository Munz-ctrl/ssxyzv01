<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TANA.EXE</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #05050a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      color: #e0e0e0;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* в”Җв”Җ Header в”Җв”Җ */
    #header {
      font-size: 10px;
      color: #4ecca3;
      letter-spacing: 3px;
      margin-bottom: 8px;
      text-shadow: 0 0 12px rgba(78,204,163,0.7);
      animation: flicker 4s infinite;
      flex-shrink: 0;
    }
    @keyframes flicker {
      0%,95%,100%{opacity:1}96%{opacity:0.6}97%{opacity:1}98%{opacity:0.5}99%{opacity:1}
    }

    /*
     * в”Җв”Җ GAME CONTAINER в”Җв”Җ
     *  Landscape 2:1.  Sizes itself to fit the viewport:
     *  вҖ“ Desktop: up to 1200 px wide
     *  вҖ“ Portrait mobile: 100 vw wide вҶ’ ~195 px tall (joystick overlaid on canvas)
     *  вҖ“ Landscape mobile: constrained by height
     */
    #game-container {
      position: relative;
      /* JS sets exact px width/height via resizeGame() вҖ” no CSS math guessing */
      border: 2px solid #4ecca3;
      box-shadow:
        0 0 0 1px #0a0a14,
        0 0 50px rgba(78,204,163,0.2),
        inset 0 0 30px rgba(0,0,0,0.5);
      flex-shrink: 1;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* CRT scanlines */
    #game-container::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px
      );
      pointer-events: none;
      z-index: 50;
    }

    /* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
       POPUP  (email + info modal)
    в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    #popup-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5,5,10,0.90);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      z-index: 30;
    }
    #popup-overlay.active { opacity: 1; pointer-events: all; }

    #popup-box {
      background: #09091a;
      border: 2px solid #4ecca3;
      box-shadow: 0 0 40px rgba(78,204,163,0.3), 0 0 0 1px #0a0a14;
      padding: 26px 28px 22px;
      width: min(360px, 92%);
      position: relative;
      animation: popIn 0.12s ease forwards;
    }
    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    #popup-close {
      position: absolute; top: 8px; right: 10px;
      background: none; border: none;
      color: #4ecca3; font-family: 'Press Start 2P', monospace;
      font-size: 9px; cursor: pointer; padding: 4px 6px;
    }
    #popup-close:hover { color: #fff; }
    #popup-icon   { font-size: 24px; margin-bottom: 10px; }
    #popup-title  {
      font-size: 10px; color: #4ecca3;
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 1px solid #1a2a20;
      text-shadow: 0 0 8px rgba(78,204,163,0.4);
    }
    #popup-body   { font-size: 7.5px; color: #b0b8d0; line-height: 2.2; }

    /* email form */
    #email-wrap { margin-top: 14px; }
    #email-input {
      width: 100%;
      background: #080818;
      border: 1px solid #4ecca3;
      color: #4ecca3;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 9px 10px;
      margin-bottom: 8px;
      outline: none;
      display: block;
    }
    #email-input::placeholder { color: #1a3a2a; }
    #email-input:focus { border-color: #78ffd0; }
    #email-submit {
      width: 100%;
      background: rgba(78,204,163,0.08);
      border: 1px solid #4ecca3;
      color: #4ecca3;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 9px;
      cursor: pointer;
      transition: background 0.1s;
      display: block;
    }
    #email-submit:hover { background: rgba(78,204,163,0.22); }
    #email-ok {
      font-size: 7px; color: #4ecca3;
      margin-top: 10px; display: none; text-align: center;
    }

    #popup-hint {
      margin-top: 14px; padding-top: 10px;
      border-top: 1px solid #141430;
      font-size: 6px; color: #2a2a44; text-align: center;
    }

    /* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
       TV VIDEO OVERLAY
    в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    #tv-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      z-index: 35;
    }
    #tv-overlay.active { opacity: 1; pointer-events: all; }

    #tv-frame-wrap {
      width: min(640px, 92%);
      aspect-ratio: 16/9;
      border: 2px solid #4ecca3;
      box-shadow: 0 0 40px rgba(78,204,163,0.35);
      background: #000;
    }
    #tv-frame-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    #tv-close-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px; color: #4ecca3;
      background: rgba(78,204,163,0.06);
      border: 1px solid rgba(78,204,163,0.4);
      padding: 8px 18px; cursor: pointer;
      transition: background 0.1s;
    }
    #tv-close-btn:hover { background: rgba(78,204,163,0.2); }

    /* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
       TOUCH CONTROLS  (overlaid on canvas)
       Only shown on coarse-pointer devices
    в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    #touch-ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: none;        /* hidden on desktop */
      z-index: 20;
    }
    @media (hover: none) and (pointer: coarse) {
      #touch-ui { display: block; }
    }

    /* joystick вҖ” bottom-left */
    #joystick-zone {
      position: absolute;
      bottom: 14px; left: 14px;
      width: 90px; height: 90px;
      pointer-events: all;
      touch-action: none;
    }
    #joystick-base {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: rgba(78,204,163,0.05);
      border: 2px solid rgba(78,204,163,0.28);
    }
    #joystick-knob {
      position: absolute;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #4ecca3, #1a5c50);
      border: 2px solid rgba(78,204,163,0.9);
      box-shadow: 0 0 12px rgba(78,204,163,0.4);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none;
    }

    /* interact button вҖ” bottom-right */
    #interact-btn {
      position: absolute;
      bottom: 20px; right: 14px;
      width: 58px; height: 58px;
      border-radius: 50%;
      background: rgba(249,199,79,0.07);
      border: 2px solid rgba(249,199,79,0.45);
      display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 2px;
      pointer-events: all; touch-action: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.08s, box-shadow 0.08s;
    }
    #interact-btn.pressed {
      background: rgba(249,199,79,0.28);
      box-shadow: 0 0 20px rgba(249,199,79,0.5);
    }
    #interact-btn .bkey  { font-size: 14px; color: #f9c74f; line-height: 1; }
    #interact-btn .blbl  { font-size: 4px; color: rgba(249,199,79,0.4); letter-spacing: 1px; }

    /* в”Җв”Җ Desktop hint в”Җв”Җ */
    #hint {
      font-size: 7px; color: #242436;
      margin-top: 8px; letter-spacing: 1px;
      flex-shrink: 0;
    }
    #hint span { color: #4ecca3; }
    @media (hover: none) and (pointer: coarse) { #hint { display: none; } }
  </style>
</head>
<body>

<div id="header">вҳ… TANA.EXE вҳ…</div>

<div id="game-container">
  <canvas id="gameCanvas"></canvas>

  <!-- Info / Email popup -->
  <div id="popup-overlay">
    <div id="popup-box">
      <button id="popup-close">вң•</button>
      <div id="popup-icon"></div>
      <div id="popup-title"></div>
      <div id="popup-body"></div>
      <div id="email-wrap" style="display:none">
        <input id="email-input" type="email" placeholder="your@email.com" autocomplete="email">
        <button id="email-submit">JOIN THE LIST вҶ’</button>
        <div id="email-ok">вң“ YOU'RE ON THE LIST</div>
      </div>
      <div id="popup-hint">[ tap вң• or press ESC to close ]</div>
    </div>
  </div>

  <!-- TV video overlay -->
  <div id="tv-overlay">
    <div id="tv-frame-wrap">
      <iframe id="tv-iframe" src="" allowfullscreen
        allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    </div>
    <button id="tv-close-btn">вң•  CLOSE</button>
  </div>

  <!-- Touch controls (overlaid) -->
  <div id="touch-ui">
    <div id="joystick-zone">
      <div id="joystick-base"></div>
      <div id="joystick-knob"></div>
    </div>
    <div id="interact-btn">
      <span class="bkey">E</span>
      <span class="blbl">ACT</span>
    </div>
  </div>
</div>

<div id="hint">
  <span>WASD</span> / <span>вҶ‘вҶ“вҶҗвҶ’</span> вҖ” MOVE &nbsp;&nbsp;
  <span>E</span> вҖ” INTERACT &nbsp;&nbsp;
  <span>ESC</span> вҖ” CLOSE &nbsp;&nbsp;
  <span>`</span> вҖ” DEBUG
</div>

<script>
'use strict';

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—
//  в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ
//  в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в–Ҳв–Ҳв•— в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв–Ҳв•—
//  в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘
//  в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ
//   в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•қ  в•ҡв•җв•җв•җв•қв•ҡв•җв•қ     в•ҡв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  WORLD & VIEWPORT
//
//  в–ә WORLD SIZE auto-derives from base.png actual pixel dimensions.
//    This means world coordinate (x, y) = pixel (x, y) in your image.
//    No more stretching. Object positions map exactly to the art.
//
//  в–ә VIEW is a fixed internal canvas resolution (2:1 landscape).
//    The CSS scales it up to fill the container вҖ” never blurry.
//
//  в–ә PLAYER SIZE scales with world height so proportions stay correct
//    regardless of image size.
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

// These get overwritten by bgImg.onload вҖ” do not change manually
let WORLD_W = 1200;   // placeholder вҖ” replaced once image loads
let WORLD_H = 600;    // placeholder

const VIEW_W  = 1200;  // canvas internal width  (fixed, 2:1)
const VIEW_H  = 600;  // canvas internal height

// в”Җв”Җ Player geometry (% of world height so it scales with image) в”Җв”Җ
//  Target: player вүҲ 9% of world height, feet strip вүҲ bottom 23% of sprite
let PW          = 56;
let PH          = 76;
let FEET_OY     = 58;   // top of feet rect (from player.y)
let FEET_H      = 18;
let FEET_MARGIN = 10;
const SPEED = 3.5;

// в”Җв”Җ Walkable zone вҖ” TUNE THESE with debug mode (press ` backtick) в”Җв”Җ
//  After image loads these update automatically, but fine-tune as needed:
//  FLOOR_TOP = world Y where floor plane starts (below wall/baseboard)
//  FLOOR_BTM = world Y of the front wall / bottom of walkable area
let FLOOR_TOP = 285;
let FLOOR_BTM = 580;  // default safe margin вҖ” bgImg.onload recalculates both
let ROOM_L    = 10;
let ROOM_R    = WORLD_W - 10;

// в”Җв”Җ Sprite sheet layout: rows = directions, cols = frames в”Җв”Җ
//  row 0=down  1=up  2=left  3=right
//  col 0=idle  1=walkA
const FRAME_W  = 256;
const FRAME_H  = 256;
const DIR_ROW  = { down:0, up:1, left:2, right:3 };

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  CANVAS
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
canvas.width  = VIEW_W;
canvas.height = VIEW_H;

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  ASSET LOADING
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function loadImg(src) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = src;
  return img;
}

// в–ё Swap these paths to wherever you host your assets
const bgImg     = loadImg('/apps/tanapixelgame/assets/base.png');
const spriteImg = loadImg('/apps/tanapixelgame/assets/spritetest.png');

// в”Җв”Җ Auto-size world to image в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  Once base.png loads, world coordinates = image pixel coordinates.
//  Player size scales proportionally. Floor bounds are estimated
//  at 45% and 95% of image height вҖ” tune with debug mode (press `).
bgImg.onload = () => {
  WORLD_W   = bgImg.naturalWidth;
  WORLD_H   = bgImg.naturalHeight;
  ROOM_R    = WORLD_W - 10;

  // Player: ~9% of image height, feet strip = bottom 23%
  PH          = Math.round(WORLD_H * 0.09);
  PW          = Math.round(PH * 0.75);
  FEET_OY     = Math.round(PH * 0.77);
  FEET_H      = Math.round(PH * 0.23);
  FEET_MARGIN = Math.round(PW * 0.18);

  // Floor bounds: rough estimate вҖ” use debug (`) to fine-tune
  FLOOR_TOP = Math.round(WORLD_H * 0.46);
  FLOOR_BTM = Math.round(WORLD_H * 0.96);

  // Respawn player at centre of walkable area if they're out of bounds
  player.x = WORLD_W / 2 - PW / 2;
  player.y = FLOOR_TOP + (FLOOR_BTM - FLOOR_TOP) * 0.7 - PH;

  console.log(`[TANA.EXE] World: ${WORLD_W}Г—${WORLD_H} | Player: ${PW}Г—${PH} | Floor: ${FLOOR_TOP}вҖ“${FLOOR_BTM}`);
};

//  CAMERA
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const cam = { x: 0, y: 0 };

function updateCamera() {
  // Centre camera on player horizontally and vertically
  cam.x = player.x + PW / 2 - VIEW_W / 2;
  cam.y = player.y + PH / 2 - VIEW_H / 2;
  // Clamp to world bounds
  cam.x = Math.max(0, Math.min(WORLD_W - VIEW_W, cam.x));
  cam.y = Math.max(0, Math.min(WORLD_H - VIEW_H, cam.y));
}

// World вҶ’ screen transform
function wx(worldX) { return Math.round(worldX - cam.x); }
function wy(worldY) { return Math.round(worldY - cam.y); }

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let lastAxis = 'x';

const player = {
  x: WORLD_W / 2 - PW / 2,   // start centre of world
  y: 460,   // safe default вҖ” bgImg.onload recalculates this anyway
  vx: 0, vy: 0,
  facing: 'down',
  animFrame: 0,
  animTick: 0,
};

// World-space feet rect for collision & depth sorting
function playerFeetRect(px, py) {
  return {
    x: (px ?? player.x) + FEET_MARGIN,
    y: (py ?? player.y) + FEET_OY,
    w: PW - FEET_MARGIN * 2,
    h: FEET_H,
  };
}
function playerBaseY() { return player.y + FEET_OY + FEET_H; }

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  COLLISION
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function rectsOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x
      && a.y < b.y+b.h && a.y+a.h > b.y;
}

function wouldCollide(px, py) {
  const feet = playerFeetRect(px, py);

  // Object collisions (bottom-strip only per object)
  for (const obj of sceneObjects) {
    if (!obj.collision) continue;
    if (rectsOverlap(feet, obj.collision)) return true;
  }

  // World / floor boundary
  if (px < ROOM_L || px + PW > ROOM_R) return true;
  if (feet.y < FLOOR_TOP)  return true;
  if (feet.y + feet.h > FLOOR_BTM) return true;

  return false;
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  INTERACTION
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const INTERACT_RANGE = 160; // world pixels

function getNearbyObject() {
  const px = player.x + PW / 2;
  const py = player.y + FEET_OY + FEET_H / 2;
  for (const obj of sceneObjects) {
    if (!obj.interactable) continue;
    const ocx = obj.x + obj.w / 2;
    const ocy = obj.baseY;
    if (Math.hypot(px - ocx, py - ocy) < INTERACT_RANGE) return obj;
  }
  return null;
}

//  PROXIMITY AUDIO  (ambient TV glow sound)
//
//  в–ё To enable: set AMBIENT_AUDIO_SRC to a hosted audio file path.
//    e.g.  const AMBIENT_AUDIO_SRC = '/apps/tanapixelgame/assets/ambient.mp3';
//  в–ё Volume scales from 0 вҶ’ MAX_VOL as player approaches TV.
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const AMBIENT_AUDIO_SRC = null;   // вҶҗ swap in your audio file path
const PROX_MAX_DIST     = 380;    // world px вҖ” silent beyond this
const PROX_MAX_VOL      = 0.75;

let proxAudio = null;

function initProxAudio() {
  if (!AMBIENT_AUDIO_SRC) return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    const ctx2 = new AC();
    const gainNode = ctx2.createGain();
    gainNode.gain.value = 0;
    gainNode.connect(ctx2.destination);
    const el = new Audio(AMBIENT_AUDIO_SRC);
    el.loop = true;
    const src = ctx2.createMediaElementSource(el);
    src.connect(gainNode);
    el.play().catch(() => {});
    proxAudio = { ctx: ctx2, gainNode };
  } catch(e) { console.warn('ProxAudio init failed:', e); }
}

function setProxGain(v) {
  if (!proxAudio) return;
  proxAudio.gainNode.gain.setTargetAtTime(v, proxAudio.ctx.currentTime, 0.4);
}

function updateProxAudio() {
  if (!proxAudio || tvOpen) return;
  const tvObj = sceneObjects.find(o => o.id === 'tv');
  if (!tvObj) return;
  const dx = (player.x + PW/2) - (tvObj.x + tvObj.w/2);
  const dy = (player.y + FEET_OY) - tvObj.baseY;
  const dist = Math.hypot(dx, dy);
  setProxGain(Math.max(0, 1 - dist / PROX_MAX_DIST) * PROX_MAX_VOL);
}

// Init audio on first user gesture
let _audioInited = false;
function tryInitAudio() {
  if (_audioInited) return;
  _audioInited = true;
  initProxAudio();
}

//  INPUT вҖ” keyboard
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  INPUT вҖ” virtual joystick
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const joy = { dx: 0, dy: 0, active: false };
const JOY_MAX = 30; // px from centre
const jZone = document.getElementById('joystick-zone');
const jKnob = document.getElementById('joystick-knob');
let jCX = 0, jCY = 0, jTid = null;

function jStart(e) {
  e.preventDefault();
  const t = e.changedTouches[0]; jTid = t.identifier;
  const r = jZone.getBoundingClientRect();
  jCX = r.left + r.width/2; jCY = r.top + r.height/2;
  jMove(e);
}
function jMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== jTid) continue;
    let dx = t.clientX - jCX, dy = t.clientY - jCY;
    const d = Math.hypot(dx, dy);
    if (d > JOY_MAX) { dx = dx/d*JOY_MAX; dy = dy/d*JOY_MAX; }
    jKnob.style.left = `calc(50% + ${dx}px)`;
    jKnob.style.top  = `calc(50% + ${dy}px)`;
    jKnob.style.transform = 'translate(-50%,-50%)';
    joy.dx = dx/JOY_MAX; joy.dy = dy/JOY_MAX; joy.active = true;
  }
}
function jEnd(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== jTid) continue;
    jKnob.style.left = jKnob.style.top = '50%';
    jKnob.style.transform = 'translate(-50%,-50%)';
    joy.dx = joy.dy = 0; joy.active = false; jTid = null;
  }
}
jZone.addEventListener('touchstart',  jStart, { passive:false });
jZone.addEventListener('touchmove',   jMove,  { passive:false });
jZone.addEventListener('touchend',    jEnd,   { passive:false });
jZone.addEventListener('touchcancel', jEnd,   { passive:false });

//  INPUT вҖ” interact button
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

function tryInteract() {
  if (popupOpen) { closePopup(); return; }

  const obj = getNearbyObject();

  if (obj.action === 'video') openTV(obj.videoId);
  if (obj.action === 'email') openEmailPopup();
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  UPDATE
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function update() {
  if (popupOpen || tvOpen) return;

  let vx = 0, vy = 0;

  if (joy.active) {
    // Joystick вҶ’ snap to dominant axis
    if (Math.abs(joy.dx) >= Math.abs(joy.dy)) vx = joy.dx * SPEED;
    else                                        vy = joy.dy * SPEED;
  } else {
    const up    = keys['w'] || keys['W'] || keys['ArrowUp'];
    const down  = keys['s'] || keys['S'] || keys['ArrowDown'];
    const left  = keys['a'] || keys['A'] || keys['ArrowLeft'];
    const right = keys['d'] || keys['D'] || keys['ArrowRight'];
    const wX = left || right, wY = up || down;
    if (wX && !wY) lastAxis = 'x';
    if (wY && !wX) lastAxis = 'y';
    if      (lastAxis==='x' && wX) vx = right ? SPEED : -SPEED;
    else if (lastAxis==='y' && wY) vy = down  ? SPEED : -SPEED;
    else if (wX)                   vx = right ? SPEED : -SPEED;
    else if (wY)                   vy = down  ? SPEED : -SPEED;
  }

  // Facing direction
  if (Math.abs(vx) > 0.1 || Math.abs(vy) > 0.1) {
    const ax = Math.abs(vx), ay = Math.abs(vy);
    if      (ax >= ay && vx > 0) player.facing = 'right';
    else if (ax >= ay && vx < 0) player.facing = 'left';
    else if (vy > 0)             player.facing = 'down';
    else                         player.facing = 'up';
  }

  // Axis-separated movement (allows sliding along walls)
  if (vx !== 0 && !wouldCollide(player.x + vx, player.y)) player.x += vx;
  if (vy !== 0 && !wouldCollide(player.x, player.y + vy)) player.y += vy;

  // Walk animation
  const moving = Math.abs(vx) > 0.1 || Math.abs(vy) > 0.1;
  if (moving) {
    if (++player.animTick >= 10) { player.animTick = 0; player.animFrame ^= 1; }
  } else {
    player.animFrame = player.animTick = 0;
  }

  updateCamera();
  updateProxAudio();
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  RENDER HELPERS
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function roundRect(cx, x, y, w, h, r) {
  cx.beginPath();
  cx.moveTo(x+r,y); cx.lineTo(x+w-r,y); cx.arcTo(x+w,y,x+w,y+r,r);
  cx.lineTo(x+w,y+h-r); cx.arcTo(x+w,y+h,x+w-r,y+h,r);
  cx.lineTo(x+r,y+h); cx.arcTo(x,y+h,x,y+h-r,r);
  cx.lineTo(x,y+r); cx.arcTo(x,y,x+r,y,r);
  cx.closePath();
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  DRAW вҖ” BACKGROUND
//  Maps bgImg to the full world, then draws only the
//  camera-visible slice into the canvas.
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawBackground() {
  ctx.imageSmoothingEnabled = false;

  if (bgImg.complete && bgImg.naturalWidth > 0) {
    // World coords now equal image pixel coords (1:1 after onload).
    // Just crop the camera viewport directly from the source image.
    const scaleX = bgImg.naturalWidth  / WORLD_W;
    const scaleY = bgImg.naturalHeight / WORLD_H;
    ctx.drawImage(
      bgImg,
      Math.round(cam.x * scaleX),
      Math.round(cam.y * scaleY),
      Math.round(VIEW_W * scaleX),
      Math.round(VIEW_H * scaleY),
      0, 0, VIEW_W, VIEW_H
    );
  } else {
    const g = ctx.createLinearGradient(0, 0, 0, VIEW_H);
    g.addColorStop(0,    '#2a1f10');
    g.addColorStop(0.45, '#3d2810');
    g.addColorStop(0.45, '#5c3820');
    g.addColorStop(1,    '#7a4a28');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  DRAW вҖ” PLAYER
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawPlayer() {
  const sx = wx(player.x);
  const sy = wy(player.y);

  // Drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.30)';
  ctx.beginPath();
  ctx.ellipse(sx + PW/2, sy + PH + 3, PW/2.5, 5, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.imageSmoothingEnabled = false;
  if (spriteImg.complete && spriteImg.naturalWidth > 0) {
    const srcX = player.animFrame * FRAME_W;
    const srcY = DIR_ROW[player.facing] * FRAME_H;
    ctx.drawImage(spriteImg, srcX, srcY, FRAME_W, FRAME_H, sx, sy, PW, PH);
  } else {
    // Fallback block character
    ctx.fillStyle = '#e94560';
    ctx.fillRect(sx + 8, sy, PW - 16, PH * 0.35);
    ctx.fillStyle = '#f9c74f';
    ctx.fillRect(sx + 4, sy + PH * 0.35, PW - 8, PH * 0.65);
  }

  // Name tag
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  roundRect(ctx, sx + PW/2 - 20, sy - 14, 40, 11, 2);
  ctx.fill();
  ctx.fillStyle = '#4ecca3';
  ctx.font = '5px "Press Start 2P"';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('TANA', sx + PW/2, sy - 9);
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  DRAW вҖ” INTERACT PROMPT  (floating [E] above object)
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawInteractPrompt(obj) {
  const sx = wx(obj.x + obj.w / 2);
  const sy = wy(obj.y - 8);
  const bounce = Math.sin(Date.now() / 230) * 3;
  const label = `[E] ${obj.label}`;

  ctx.font = '6px "Press Start 2P"';
  const tw = ctx.measureText(label).width + 18;

  ctx.fillStyle = 'rgba(249,199,79,0.13)';
  ctx.strokeStyle = '#f9c74f'; ctx.lineWidth = 1.5;
  roundRect(ctx, sx - tw/2, sy - 19 + bounce, tw, 14, 3);
  ctx.fill(); ctx.stroke();

  ctx.fillStyle = '#f9c74f';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, sx, sy - 12 + bounce);

  // Down arrow
  ctx.beginPath();
  ctx.moveTo(sx, sy + bounce);
  ctx.lineTo(sx - 4, sy - 5 + bounce);
  ctx.lineTo(sx + 4, sy - 5 + bounce);
  ctx.closePath(); ctx.fill();
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  DRAW вҖ” HUD
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawHUD() {
  // Top strip
  ctx.fillStyle = 'rgba(5,5,10,0.72)';
  ctx.fillRect(0, 0, VIEW_W, 20);
  ctx.fillStyle = '#4ecca3';
  ctx.font = '6px "Press Start 2P"';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('в–ё TANA ROOM', 8, 10);

  // Bottom action hint
  const near = getNearbyObject();
  if (near && !popupOpen && !tvOpen) {
    ctx.fillStyle = 'rgba(5,5,10,0.72)';
    ctx.fillRect(0, VIEW_H - 20, VIEW_W, 20);
    ctx.fillStyle = '#f9c74f';
    ctx.font = '6px "Press Start 2P"';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(`[E]  вҶ’  ${near.label}`, VIEW_W / 2, VIEW_H - 10);
  }
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  MAIN RENDER  вҖ”  Y-SORT  (depth sort by baseY)
//
//  How Y-sorting creates correct layering:
//  вҖў Every entity (object or player) has a baseY in WORLD space.
//  вҖў Entities are sorted ascending by baseY before drawing.
//  вҖў Lower baseY = drawn first = appears further away / behind.
//  вҖў Higher baseY = drawn last = appears closer / in front.
//
//  Example: shelf baseY=420, player baseY=390 when walking behind it.
//  390 < 420 вҶ’ player draws first вҶ’ shelf draws on top вҶ’ player appears behind shelf. вң“
//  When player walks below: player baseY=480 > 420 вҶ’ player draws on top вҶ’ in front. вң“
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function render() {
  ctx.clearRect(0, 0, VIEW_W, VIEW_H);
  ctx.imageSmoothingEnabled = false;

  drawBackground();

  const nearby = getNearbyObject();

  // Build render list
  const renderList = [];

  for (const obj of sceneObjects) {
    renderList.push({
      baseY: obj.baseY,
      fn: () => {
        const sx = wx(obj.x);
        const sy = wy(obj.y);
        // Cull off-screen objects
        if (sx + obj.w < 0 || sx > VIEW_W) return;
        if (sy + obj.h < 0 || sy > VIEW_H) return;

        ctx.imageSmoothingEnabled = false;
        if (obj.img && obj.img.complete && obj.img.naturalWidth > 0) {
          ctx.drawImage(obj.img, sx, sy, obj.w, obj.h);
        } else {
          obj.draw(ctx, sx, sy);
        }

        // Interaction prompt when near
        if (obj.interactable && obj === nearby && !popupOpen && !tvOpen) {
          drawInteractPrompt(obj);
        }
      }
    });
  }

  // Add player to sort list
  renderList.push({ baseY: playerBaseY(), fn: drawPlayer });

  // Sort by Y depth
  renderList.sort((a, b) => a.baseY - b.baseY);

  // Draw all
  for (const item of renderList) item.fn();

  // в”Җв”Җ DEBUG OVERLAY (press ` backtick to toggle) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if (debugOn) {
    for (const obj of sceneObjects) {
      const sx = wx(obj.x), sy = wy(obj.y);
      // Green = full sprite bounding box
      ctx.strokeStyle = 'rgba(0,255,100,0.7)'; ctx.lineWidth = 1;
      ctx.strokeRect(sx, sy, obj.w, obj.h);
      // Red = collision rect (the only part that blocks player)
      if (obj.collision) {
        const cx = wx(obj.collision.x), cy = wy(obj.collision.y);
        ctx.fillStyle = 'rgba(255,40,40,0.18)';
        ctx.fillRect(cx, cy, obj.collision.w, obj.collision.h);
        ctx.strokeStyle = 'rgba(255,40,40,0.9)'; ctx.lineWidth = 1.5;
        ctx.strokeRect(cx, cy, obj.collision.w, obj.collision.h);
      }
      // Yellow = baseY depth-sort line
      ctx.strokeStyle = 'rgba(255,220,0,0.8)'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(wx(obj.x), wy(obj.baseY));
      ctx.lineTo(wx(obj.x + obj.w), wy(obj.baseY));
      ctx.stroke();
      // Label
      ctx.fillStyle = '#fff'; ctx.font = '5px monospace';
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillText(`${obj.id} (${obj.x},${obj.y}) ${obj.w}Г—${obj.h}`, sx + 2, sy + 2);
    }
    // Cyan = player feet collision rect
    const pf = playerFeetRect();
    ctx.strokeStyle = 'cyan'; ctx.lineWidth = 1.5;
    ctx.strokeRect(wx(pf.x), wy(pf.y), pf.w, pf.h);
    ctx.fillStyle = 'rgba(0,255,255,0.1)';
    ctx.fillRect(wx(pf.x), wy(pf.y), pf.w, pf.h);
    // Blue dashes = FLOOR_TOP / FLOOR_BTM walkable zone
    ctx.strokeStyle = 'rgba(80,160,255,0.5)'; ctx.lineWidth = 1;
    ctx.setLineDash([6, 4]);
    ctx.beginPath(); ctx.moveTo(0, wy(FLOOR_TOP)); ctx.lineTo(VIEW_W, wy(FLOOR_TOP)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, wy(FLOOR_BTM)); ctx.lineTo(VIEW_W, wy(FLOOR_BTM)); ctx.stroke();
    ctx.setLineDash([]);
    // World info overlay
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, VIEW_H - 42, VIEW_W, 42);
    ctx.fillStyle = '#4ecca3'; ctx.font = '5px monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(
      `WORLD ${WORLD_W}Г—${WORLD_H}  |  CAM (${Math.round(cam.x)},${Math.round(cam.y)})  |  PLAYER (${Math.round(player.x)},${Math.round(player.y)})  baseY=${playerBaseY()}`,
      6, VIEW_H - 32
    );
    ctx.fillText(
      `FLOOR_TOP=${FLOOR_TOP}  FLOOR_BTM=${FLOOR_BTM}  PW=${PW} PH=${PH}  FEET_OY=${FEET_OY}`,
      6, VIEW_H - 18
    );
    // Debug label top-right
    ctx.fillStyle = '#f9c74f'; ctx.textAlign = 'right';
    ctx.fillText('[ ` ] DEBUG ON', VIEW_W - 6, VIEW_H - 32);
  }

  drawHUD();
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  RESPONSIVE SIZING
//  Calculates the largest 2:1 container that fits the
//  viewport minus the header and hint bar heights.
//  Runs on load and on every resize.
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const gameContainer = document.getElementById('game-container');

function resizeGame() {
  const header  = document.getElementById('header');
  const hint    = document.getElementById('hint');
  const vw      = window.innerWidth;
  const vh      = window.innerHeight;

  // Total vertical space consumed by UI outside the game
  const uiH = (header ? header.offsetHeight + 8 : 28)
             + (hint && getComputedStyle(hint).display !== 'none'
                ? hint.offsetHeight + 8 : 0)
             + 16; // body padding buffer

  const availH = vh - uiH;
  const availW = vw;

  // Fit 2:1 ratio into available space, cap at 1200px wide
  let w = Math.min(1200, availW, availH * 2);
  let h = w / 2;

  // Never let height exceed available space
  if (h > availH) { h = availH; w = h * 2; }

  gameContainer.style.width  = Math.floor(w) + 'px';
  gameContainer.style.height = Math.floor(h) + 'px';
}

window.addEventListener('resize', resizeGame);
// Run once immediately (fonts/layout may not be painted yet, so also run after a tick)
resizeGame();
setTimeout(resizeGame, 100);

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  GAME LOOP
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
(function loop() {
  update();
  render();
  requestAnimationFrame(loop);
})();

</script>
