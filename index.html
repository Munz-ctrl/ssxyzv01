<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sunsex XYZ</title>
  <link rel="stylesheet" href="/shared/css/home.css">
</head>
<body class="home-body">
  <div class="home-shell">

    <header class="home-header">
      <div class="home-logo">sunsex.xyz</div>
      <div class="home-tagline">real-life mirror · social RPG · in progress</div>
    </header>

    <main class="home-grid">

      <!-- Primary island: enter the world -->
      <a class="home-island primary" href="/dashboard">
        <div class="island-label">Enter</div>
        <div class="island-title">The World</div>
        <div class="island-sub">players · map · profiles · avatars</div>
      </a>

      <!-- Secondary island: tools -->
      <section class="home-island secondary">
        <div class="island-label">Create</div>
        <div class="island-title">Avatar Studio</div>
        <div class="island-links">
          <a href="/dressup" class="pill-link">DressUp</a>
          <a href="/nomadsuitcase" class="pill-link">Nomad Suitcase</a>
        </div>
      </section>

      <!-- Tertiary island: explore -->
      <section class="home-island tertiary">
        <div class="island-label">Explore</div>
        <div class="island-title">Live Map</div>
        <div class="island-links">
          <a href="/map" class="pill-link">Global Map</a>
          <a href="/tana" class="pill-link">Pixel World</a>
        </div>
      </section>

    </main>

    <footer class="home-footer animated-text">
      <span class="home-footer-main">SUNSEX_TORRENT · phase 1 · guest mode</span>
      <span class="home-footer-dots">...</span>
    </footer>

  </div>
</body>
</html>
